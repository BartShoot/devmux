version: 2

before:
  hooks:
    - go mod tidy
    - go run scripts/build_deps.go

builds:
  # 1. THE DAEMON - LINUX
  - id: devmuxd-linux
    main: ./cmd/devmuxd
    binary: devmuxd
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    flags:
      - -tags=ghostty
    ldflags:
      - -s -w

  # 2. THE CLI (Pure Go)
  - id: devmux-cli-linux
    main: ./cmd/devmux
    binary: devmux
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - devmuxd-linux
      - devmux-cli-linux
    format: tar.gz
    files:
      - src: third_party/ghostty/lib/linux/libghostty-vt.so*
        dst: lib
        strip_parent: true

nfpms:
  - package_name: devmux
    maintainer: "Bartosz Dobija <dobija.bartosz@gmail.com>"
    vendor: "devmux"
    description: "Terminal process manager and multiplexer."
    builds:
      - devmuxd-linux
      - devmux-cli-linux
    formats:
      - deb
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: third_party/ghostty/lib/linux/libghostty-vt.so*
        dst: /usr/lib/devmux/
    scripts:
      postinstall: scripts/postinstall.sh
      postremove: scripts/postremove.sh
