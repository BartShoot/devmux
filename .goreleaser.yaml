version: 2

before:
  hooks:
    - go mod tidy
    - go run scripts/build_deps.go

builds:
  # 1. THE DAEMON - LINUX
  - id: devmuxd-linux
    main: ./cmd/devmuxd
    binary: devmuxd
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    flags:
      - -tags=ghostty
    ldflags:
      - -s -w

  # 2. THE DAEMON - WINDOWS
  # NOTE: Can only be built natively on Windows (needs Windows headers for CGO).
  # Uncomment when building on Windows or in CI with a Windows runner.
  # - id: devmuxd-windows
  #   main: ./cmd/devmuxd
  #   binary: devmuxd
  #   goos: [windows]
  #   goarch: [amd64]
  #   env:
  #     - CGO_ENABLED=1
  #     - CC=zig cc
  #   flags:
  #     - -tags=ghostty
  #   ldflags:
  #     - -s -w

  # 3. THE CLI (Pure Go - works for both)
  - id: devmux-cli
    main: ./cmd/devmux
    binary: devmux
    goos: [linux, windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - devmuxd-linux
      # - devmuxd-windows
      - devmux-cli
    allow_different_binary_count: true
    format_overrides:
      - goos: linux
        formats: [tar.gz]
      - goos: windows
        formats: [zip]
    files:
      - src: third_party/ghostty/lib/linux/libghostty-vt.so*
        dst: lib
        strip_parent: true
      - src: third_party/ghostty/lib/windows/*.dll
        dst: .
        strip_parent: true

nfpms:
  - package_name: devmux
    maintainer: "Bartosz Dobija <dobija.bartosz@gmail.com>"
    vendor: "devmux"
    description: "Terminal process manager and multiplexer."
    builds:
      - devmuxd-linux
      - devmux-cli
    formats:
      - deb
    contents:
      - src: third_party/ghostty/lib/linux/libghostty-vt.so*
        dst: /usr/lib/devmux/
    scripts:
      postinstall: scripts/postinstall.sh
      postremove: scripts/postremove.sh
